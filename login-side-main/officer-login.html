<!DOCTYPE html>
<html lang="en">
    <head>
        <title>WhatsUpDLSU - Officer Login</title>

        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div class="page-container">
            <h1 class="main-title">WhatsUpDLSU</h1>
            <p class="description">
                Stay updated with university events, organization activities,
                workshops, seminars, and campus announcements.
            </p>
            <div class="login-container">
                <h2>Officer Login</h2>
                <form id="loginForm">
                    <div class="input-row">
                        <label for="username">Username:</label>
                        <input type="text" id="username" name="username" required >
                    </div>
                    <div class="input-row">
                        <label for="password">Password:</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" name="password" required >
                            <button type="button" id="togglePassword" class="toggle-btn" > Show</button>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn"> SUBMIT </button>
                </form>
                <a href="student-login.html" class="officer-link"> Logging in as Student </a>
            </div>
        </div>
        <script src="js/script.js"></script>
    </body>
</html>
